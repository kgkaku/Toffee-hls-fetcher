name: updt toffee

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 
    inputs:
      debug:
        description: 'Run in debug mode'
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright==1.46.0
        playwright install chromium
    
    - name: Decode and create main.py
      env:
        MAIN_PY_BASE64: ${{ secrets.MAIN_PY }}
      run: |
        echo "🔓 Decoding main.py from base64..."
        echo "$MAIN_PY_BASE64" | base64 -d > main.py
        echo "✅ main.py created successfully"
        python -m py_compile main.py && echo "✅ Syntax OK" || exit 1
    
    - name: Run scraper
      id: scraper
      run: |
        echo "🚀 Starting Toffee Live Channel Scraper..."
        echo "⏰ Time: $(date)"
        echo "🐍 Python version: $(python --version)"
        echo ""
        python -u main.py
        
        echo "exit_code=$?" >> $GITHUB_OUTPUT
    
    - name: Check if files were generated
      id: check_files
      run: |
        echo "📁 Checking generated files..."
        
        # Install jq quietly if needed
        sudo apt-get update -qq && sudo apt-get install -y jq -qq > /dev/null 2>&1
        
        if [ -f "toffee.json" ]; then
          CHANNEL_COUNT=$(jq -r '.total_channels // 0' toffee.json 2>/dev/null || echo "0")
          WITH_COOKIE=$(jq -r '[.channels[] | select(.cookie != "")] | length' toffee.json 2>/dev/null || echo "0")
          echo "📺 Total channels scraped: $CHANNEL_COUNT"
          echo "🍪 Channels with unique cookie: $WITH_COOKIE"
          echo "channel_count=$CHANNEL_COUNT" >> $GITHUB_OUTPUT
        else
          echo "❌ toffee.json not found!"
          exit 1
        fi
    
    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [[ -n $(git status -s) ]]; then
          git add toffee-ott-navigator.m3u toffee-nsplayer.m3u toffee.json
          
          if [ -f "toffee.json" ]; then
            CHANNELS=$(jq -r '.total_channels // 0' toffee.json)
            git commit -m "🤖 Auto-update: $CHANNELS channels [$(date +%Y-%m-%d)]"
          else
            git commit -m "🤖 Auto-update: Channel list [$(date +%Y-%m-%d)]"
          fi
          
          git push origin HEAD:main
          echo "✅ Changes pushed"
        else
          echo "ℹ️ No changes detected"
        fi
    
    - name: Create release (daily)
      if: success() && github.event_name == 'schedule'
      run: |
        CURRENT_HOUR=$(date +%H)
        if [ "$CURRENT_HOUR" == "00" ] || [ "$CURRENT_HOUR" == "0" ]; then
          DATE=$(date +%Y-%m-%d)
          CHANNELS=$(jq -r '.total_channels // 0' toffee.json)
          
          gh release create "daily-$DATE" \
            toffee-ott-navigator.m3u \
            toffee-nsplayer.m3u \
            toffee.json \
            --title "📺 Daily Update: $DATE ($CHANNELS channels)" \
            --notes "🤖 Auto-generated by @kgkaku\n\n**Total channels:** $CHANNELS\n**Generated:** $(date '+%Y-%m-%d %H:%M:%S UTC')" \
            --target main \
            --latest=false
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Summary
      if: always()
      run: |
        echo "## 📊 Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Time** | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
        echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "toffee.json" ]; then
          CHANNELS=$(jq -r '.total_channels // 0' toffee.json)
          WITH_COOKIE=$(jq -r '[.channels[] | select(.cookie != "")] | length' toffee.json)
          echo "| **Channels** | $CHANNELS |" >> $GITHUB_STEP_SUMMARY
          echo "| **With Cookies** | $WITH_COOKIE |" >> $GITHUB_STEP_SUMMARY
        fi
