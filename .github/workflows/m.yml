name: Toffee

on:
  schedule:
    # Runs every 6 hours (at 0, 6, 12, 18 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium
        
    - name: Create scraper script
      env:
        SCRIPTER_BASE64: ${{ secrets.TOFFEE_PY }}
      run: |
        echo "$SCRIPTER_BASE64" | base64 -d > toffee_scraper.py
        echo "Scraper script created successfully"
        
    - name: Run scraper
      run: |
        python toffee_scraper.py
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: toffee-channels
        path: |
          toffee-ott-navigator.m3u
          toffee-nsplayer.m3u
          toffee.json
        retention-days: 7
        
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add toffee-ott-navigator.m3u toffee-nsplayer.m3u toffee.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update Toffee channels - $(date '+%Y-%m-%d %H:%M:%S')" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
