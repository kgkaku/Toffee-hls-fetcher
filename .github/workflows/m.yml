name: updt toffee

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install playwright==1.46.0
        playwright install chromium
    
    - name: Decode and create main.py
      env:
        MAIN_PY_BASE64: ${{ secrets.MAIN_PY }}
      run: |
        # Remove ALL whitespace and newlines before decoding
        echo "$MAIN_PY_BASE64" | tr -d '\n\r\t ' | base64 -d > main.py
        
        # Verify file exists and has content
        if [ ! -s main.py ]; then
          echo "❌ Failed to decode or main.py is empty"
          exit 1
        fi
        
        echo "✅ main.py created ($(wc -l < main.py) lines)"
        python -m py_compile main.py
    
    - name: Run scraper
      run: python main.py
    
    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [[ -n $(git status -s) ]]; then
          git add toffee-ott-navigator.m3u toffee-nsplayer.m3u toffee.json
          git commit -m "🤖 Update: $(date +%Y-%m-%d)"
          git push
        fi
    
    - name: Create release (daily at midnight)
      if: success() && github.event_name == 'schedule'
      run: |
        if [ "$(date +%H)" == "00" ]; then
          DATE=$(date +%Y-%m-%d)
          gh release create "daily-$DATE" \
            toffee-ott-navigator.m3u \
            toffee-nsplayer.m3u \
            toffee.json \
            --title "Daily Update $DATE" \
            --notes "Auto-generated by @kgkaku" \
            --target main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
